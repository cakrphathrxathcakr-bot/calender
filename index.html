<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศาสนกิจ พระมหาฉัตรชัย ชยญาณเมธี</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5D4037;    /* สีน้ำตาลเข้ม */
            --secondary: #8D6E63;  /* สีน้ำตาลอ่อน */
            --accent: #D4AF37;     /* สีทอง */
            --bg: #FDFBF7;         /* สีพื้นหลัง */
            --text-dark: #202020;
            --text-light: #666666;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark); 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ส่วนหัว (Header) */
        header { 
            background: linear-gradient(135deg, var(--primary) 0%, #3E2723 100%); 
            color: white; 
            text-align: center; 
            padding: 3rem 1rem; 
            border-bottom: 6px solid var(--accent); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .header-title { font-size: 2.2rem; font-weight: 700; margin: 0; color: var(--accent); text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .header-subtitle { font-size: 1.4rem; font-weight: 600; margin: 10px 0 5px 0; }
        .header-position { font-size: 1.1rem; font-weight: 300; opacity: 0.9; margin: 0; }

        .container { 
            flex-grow: 1;
            width: 100%;
            max-width: 900px; 
            margin: 30px auto; 
            padding: 0 15px; 
        }

        /* กล่องใส่ปฏิทิน */
        .calendar-box {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border-top: 5px solid var(--accent);
            overflow: hidden;
        }

        /* ทำให้ปฏิทินแสดงผลพอดีกับมือถือ (Responsive) */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 600px; /* ความสูงเริ่มต้น */
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        /* ส่วนท้าย (Footer) */
        footer {
            background-color: #f1ede4;
            color: var(--text-light);
            text-align: center;
            padding: 25px 15px;
            margin-top: 40px;
            font-size: 0.9rem;
            border-top: 1px solid #e0dcd2;
        }
        .credit { font-weight: 600; color: var(--primary); margin-top: 8px; font-size: 1rem; }

        /* ปรับความสูงปฏิทินสำหรับหน้าจอมือถือ */
        @media (max-width: 600px) {
            .iframe-container { height: 500px; }
            .header-title { font-size: 1.8rem; }
            .header-subtitle { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="header-title">ศาสนกิจ</h1>
    <h2 class="header-subtitle">พระมหาฉัตรชัย ชยญาณเมธี</h2>
    <p class="header-position">รองเจ้าคณะจังหวัดหนองบัวลำภู</p>
</header>

<div class="container">
    <div class="calendar-box">
        <div class="iframe-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=cakrphathrxathcakr%40gmail.com&ctz=Asia%2FBangkok&showTitle=0&showPrint=0&showTabs=1&showCalendars=0&showTz=0" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>
</div>

<footer>
    <div>ระบบตรวจสอบตารางศาสนกิจ (อัปเดตอัตโนมัติจาก Google Calendar)</div>
    <div class="credit">จัดทำโดย: พระมหาจักรภัทร คมฺภรญาณเมธี</div>
</footer>

</body>
</html>
