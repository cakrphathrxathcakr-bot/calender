<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศาสนกิจ พระมหาฉัตรชัย ชยญาณเมธี</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5D4037;    /* สีน้ำตาลเข้ม */
            --secondary: #8D6E63;  /* สีน้ำตาลอ่อน */
            --accent: #D4AF37;     /* สีทองเมทัลลิก */
            --bg: #FDFBF7;         /* สีพื้นหลังครีมขาว */
            --text-dark: #202020;
            --border: #E0E0E0;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark); 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ส่วนหัว */
        header { 
            background: linear-gradient(135deg, var(--primary) 0%, #3E2723 100%); 
            color: white; 
            text-align: center; 
            padding: 3rem 1rem 2.5rem; 
            border-bottom: 6px solid var(--accent); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .header-title { font-size: 2.2rem; font-weight: 700; margin: 0; color: var(--accent); text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .header-subtitle { font-size: 1.4rem; font-weight: 600; margin: 10px 0 5px 0; }
        .header-position { font-size: 1.1rem; font-weight: 300; opacity: 0.9; margin: 0; }

        .container { 
            flex-grow: 1;
            width: 100%;
            max-width: 1000px; 
            margin: 30px auto; 
            padding: 0 15px; 
        }

        .section-title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary); 
            margin: 0 0 20px 0; 
            display: flex; 
            align-items: center; 
        }
        .section-title::before {
            content: ''; display: inline-block; width: 6px; height: 28px; background: var(--accent); margin-right: 12px; border-radius: 3px;
        }

        /* ดีไซน์ตาราง (Table) */
        .table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            overflow-x: auto; /* ให้เลื่อนซ้ายขวาได้บนมือถือ */
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px; /* บังคับความกว้างขั้นต่ำไม่ให้ตารางบีบเกินไป */
        }

        thead {
            background-color: var(--secondary);
            color: white;
        }

        th {
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 1.1rem;
            vertical-align: top;
        }

        tbody tr:hover { background-color: #F9F6F0; }
        tbody tr:last-child td { border-bottom: none; }

        /* การเน้นข้อมูล */
        .col-date { width: 25%; font-weight: 600; color: var(--primary); }
        .col-time { width: 15%; font-weight: bold; }
        .col-title { width: 35%; font-weight: 600; }
        .col-location { width: 25%; color: #666; font-size: 1rem; }

        .status-now {
            display: inline-block;
            background: #E8F5E9; color: #2E7D32; 
            padding: 3px 10px; border-radius: 12px; 
            font-size: 0.85rem; font-weight: bold; 
            margin-top: 5px;
        }

        /* ส่วนท้าย */
        footer {
            background-color: #f1ede4; color: #666; text-align: center;
            padding: 25px 15px; margin-top: 40px; font-size: 0.95rem; border-top: 1px solid #e0dcd2;
        }
        .credit { font-weight: 700; color: var(--primary); margin-top: 10px; font-size: 1.1rem; }

        .status-message { text-align: center; padding: 40px; font-size: 1.2rem; color: var(--secondary); }
    </style>
</head>
<body>

<header>
    <h1 class="header-title">ศาสนกิจ</h1>
    <h2 class="header-subtitle">พระมหาฉัตรชัย ชยญาณเมธี</h2>
    <p class="header-position">รองเจ้าคณะจังหวัดหนองบัวลำภู</p>
</header>

<div class="container">
    <div class="section-title">ตารางงานที่กำลังจะถึง</div>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>วัน/เดือน/ปี</th>
                    <th>เวลา</th>
                    <th>ศาสนกิจ</th>
                    <th>สถานที่</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <tr>
                    <td colspan="4" class="status-message">⏳ กำลังโหลดข้อมูล...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer>
    <div>ระบบตรวจสอบตารางศาสนกิจ (อัปเดตอัตโนมัติ)</div>
    <div class="credit">จัดทำโดย: พระมหาจักรภัทร คมฺภรญาณเมธี</div>
</footer>

<script>
    // --- ใส่ API Key และ Calendar ID ให้เรียบร้อยแล้ว ---
    const API_KEY = 'AIzaSyDMFzZarwGw0uN1uDl91zx34hJjmVpBITs'; 
    const CALENDAR_ID = 'cakrphathrxathcakr@gmail.com';

    async function loadSchedule() {
        const tbody = document.getElementById('schedule-body');
        
        const now = new Date();
        const startStr = new Date(now.setHours(0,0,0,0)).toISOString();
        const endStr = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000).toISOString(); // ดึงล่วงหน้า 30 วัน

        const url = `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?key=${API_KEY}&timeMin=${startStr}&timeMax=${endStr}&singleEvents=true&orderBy=startTime`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            const validEvents = data.items ? data.items.filter(event => {
                const endTime = new Date(event.end.dateTime || event.end.date);
                return event.end.dateTime ? endTime > new Date() : (new Date(event.end.date).getTime() + 86400000 > new Date().getTime());
            }) : [];

            if (validEvents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="status-message">ไม่มีกำหนดการศาสนกิจในช่วงนี้</td></tr>';
                return;
            }

            tbody.innerHTML = ''; // ล้างข้อความโหลด
            
            validEvents.forEach(event => {
                const start = new Date(event.start.dateTime || event.start.date);
                const end = new Date(event.end.dateTime || event.end.date);
                
                // จัดรูปแบบวันที่
                const dateLabel = start.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
                
                // จัดรูปแบบเวลา
                let timeLabel = event.start.dateTime 
                    ? start.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.' 
                    : 'ตลอดวัน';

                // เช็คว่ากำลังดำเนินการอยู่ไหม
                const isNow = (new Date() >= start && new Date() <= end) && event.start.dateTime;
                const statusHtml = isNow ? `<br><span class="status-now">● ขณะนี้</span>` : '';

                const row = `
                    <tr>
                        <td class="col-date">${dateLabel}</td>
                        <td class="col-time">${timeLabel} ${statusHtml}</td>
                        <td class="col-title">${event.summary || 'ไม่ได้ระบุชื่องาน'}</td>
                        <td class="col-location">📍 ${event.location || '-'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4" class="status-message" style="color:red;"><b>เกิดข้อผิดพลาด:</b> ${err.message}<br><small>กรุณาตรวจสอบว่าเปิดใช้งาน Google Calendar API แล้ว</small></td></tr>`;
        }
    }

    loadSchedule();
    setInterval(loadSchedule, 300000); // อัปเดตทุก 5 นาที
</script>

</body>
</html>
