<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศาสนกิจ พระมหาฉัตรชัย ชยญาณเมธี</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5D4037;    /* สีน้ำตาลเข้ม (จีวร/ไม้) */
            --secondary: #8D6E63;  /* สีน้ำตาลอ่อน */
            --accent: #D4AF37;     /* สีทองเมทัลลิก */
            --bg: #FDFBF7;         /* สีพื้นหลังครีมขาว สบายตา */
            --text-dark: #202020;
            --text-light: #666666;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark); 
        }

        /* ส่วนหัว (Header) */
        header { 
            background: linear-gradient(135deg, var(--primary) 0%, #3E2723 100%); 
            color: white; 
            text-align: center; 
            padding: 3rem 1rem 2.5rem; 
            border-bottom: 6px solid var(--accent); 
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .header-title { font-size: 2.2rem; font-weight: 700; margin: 0; color: var(--accent); text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .header-subtitle { font-size: 1.4rem; font-weight: 600; margin: 10px 0 5px 0; }
        .header-position { font-size: 1.1rem; font-weight: 300; opacity: 0.9; margin: 0; }
        .update-time { font-size: 0.85rem; color: #bbb; margin-top: 15px; display: inline-block; background: rgba(0,0,0,0.2); padding: 4px 15px; border-radius: 20px;}

        .container { max-width: 800px; margin: 0 auto; padding: 20px 15px; }
        
        /* หัวข้อแต่ละส่วน */
        .section-title { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: var(--primary); 
            margin: 30px 0 15px; 
            display: flex; 
            align-items: center; 
        }
        .section-title::before {
            content: ''; display: inline-block; width: 5px; height: 25px; background: var(--accent); margin-right: 10px; border-radius: 3px;
        }

        /* การ์ดงานทั่วไป */
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04); 
            margin-bottom: 15px; 
            border: 1px solid #eee;
            border-left: 6px solid var(--secondary); 
            transition: transform 0.2s ease;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        
        /* การ์ดงานที่กำลังจะถึง (Highlight) */
        .card-upcoming {
            border-left: 6px solid var(--accent);
            background: linear-gradient(to right, #ffffff, #fffcf5);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);
            transform: scale(1.02);
            margin: 20px 0 35px;
        }

        .event-datetime { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: var(--primary); 
            margin-bottom: 8px; 
            border-bottom: 1px dashed #ddd; 
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .event-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        .event-location { font-size: 0.95rem; color: var(--text-light); display: flex; align-items: flex-start; }
        .event-location span { margin-right: 8px; }

        .status-now { background: #E8F5E9; color: #2E7D32; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* ส่วนท้าย (Footer) */
        footer {
            background-color: #f1ede4;
            color: var(--text-light);
            text-align: center;
            padding: 25px 15px;
            margin-top: 40px;
            font-size: 0.9rem;
            border-top: 1px solid #e0dcd2;
        }
        .credit { font-weight: 600; color: var(--primary); margin-top: 8px; font-size: 1rem; }

        .loading-state { text-align: center; padding: 50px 20px; color: var(--secondary); font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <h1 class="header-title">ศาสนกิจ</h1>
    <h2 class="header-subtitle">พระมหาฉัตรชัย ชยญาณเมธี</h2>
    <p class="header-position">รองเจ้าคณะจังหวัดหนองบัวลำภู</p>
    <div class="update-time" id="last-update">กำลังเชื่อมต่อข้อมูล...</div>
</header>

<div class="container">
    <div id="schedule-content">
        <div class="loading-state">
            ⏳ กำลังโหลดตารางศาสนกิจ...
        </div>
    </div>
</div>

<footer>
    <div>ระบบจัดการตารางงานพระเถระ อัปเดตข้อมูลอัตโนมัติ</div>
    <div class="credit">จัดทำโดย: พระมหาจักรภัทร คมฺภรญาณเมธี</div>
</footer>

<script>
    // --- ตั้งค่าข้อมูล ---
    const API_KEY = 'AIzaSyAiCtKW-U5QWp3yUsvToJlh2pT7sjiQ4Iw'; 
    const CALENDAR_ID = 'cakrphathrxathcakr@gmail.com';
    // -----------------

    async function loadSchedule() {
        const contentDiv = document.getElementById('schedule-content');
        const updateText = document.getElementById('last-update');
        
        const now = new Date();
        const startStr = new Date(now.setHours(0,0,0,0)).toISOString();
        const endStr = new Date(now.getTime() + 14 * 24 * 60 * 60 * 1000).toISOString(); // ดึงล่วงหน้า 14 วัน

        const url = `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?key=${API_KEY}&timeMin=${startStr}&timeMax=${endStr}&singleEvents=true&orderBy=startTime`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            updateText.innerText = 'อัปเดตล่าสุดเมื่อ: ' + new Date().toLocaleTimeString('th-TH') + ' น.';
            
            // กรองเฉพาะงานที่ยังไม่จบ (เวลาสิ้นสุด > ปัจจุบัน)
            const currentTime = new Date();
            let validEvents = data.items ? data.items.filter(event => {
                const endTime = new Date(event.end.dateTime || event.end.date);
                // ถ้าระบุเวลาชัดเจน ให้เช็คว่าเลยเวลาจบหรือยัง
                if(event.end.dateTime) return endTime > currentTime;
                // ถ้าเป็นงานทั้งวัน (All day) ให้นับถึงเที่ยงคืน
                return new Date(event.end.date).getTime() + 86400000 > currentTime.getTime();
            }) : [];

            if (validEvents.length === 0) {
                contentDiv.innerHTML = '<div class="card" style="text-align:center; padding: 40px;">ไม่มีกำหนดการศาสนกิจในช่วงนี้</div>';
                return;
            }

            // แยกงานที่กำลังจะถึง (งานแรกสุด) และ งานอื่นๆ
            const upcomingEvent = validEvents[0];
            const otherEvents = validEvents.slice(1);

            let htmlOutput = '';

            // 1. สร้างส่วน "งานที่กำลังจะถึง"
            htmlOutput += `<div class="section-title">งานที่กำลังจะถึง</div>`;
            htmlOutput += createCardHTML(upcomingEvent, true);

            // 2. สร้างส่วน "หน้ารวมงาน" (ถ้ามี)
            if (otherEvents.length > 0) {
                htmlOutput += `<div class="section-title" style="margin-top: 40px;">ศาสนกิจลำดับต่อไป</div>`;
                otherEvents.forEach(event => {
                    htmlOutput += createCardHTML(event, false);
                });
            }

            contentDiv.innerHTML = htmlOutput;

        } catch (err) {
            contentDiv.innerHTML = `<div class="card" style="border-left-color:red; color:red; text-align:center;">
                <b>ไม่สามารถดึงข้อมูลได้:</b><br>${err.message}
            </div>`;
        }
    }

    // ฟังก์ชันสำหรับสร้างรูปแบบการ์ด
    function createCardHTML(event, isUpcoming) {
        const start = new Date(event.start.dateTime || event.start.date);
        
        // จัดรูปแบบวันที่ (เช่น วันจันทร์ที่ 12 เมษายน 2569)
        const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        let dateLabel = start.toLocaleDateString('th-TH', dateOptions);
        
        // จัดรูปแบบเวลา
        let timeLabel = '';
        if (event.start.dateTime) {
            timeLabel = start.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
        } else {
            timeLabel = 'ตลอดวัน'; // กรณีไม่ระบุเวลา
        }

        const isNow = isOngoing(start, new Date(event.end.dateTime || event.end.date));
        const cardClass = isUpcoming ? 'card card-upcoming' : 'card';
        const statusHtml = isNow ? `<span class="status-now">● กำลังดำเนินการ</span>` : `<span>${timeLabel}</span>`;

        return `
            <div class="${cardClass}">
                <div class="event-datetime">
                    <span>📅 ${dateLabel}</span>
                    ${statusHtml}
                </div>
                <div class="event-title">${event.summary || 'ไม่ได้ระบุชื่องาน'}</div>
                <div class="event-location">
                    <span>📍</span> 
                    <span>${event.location || 'ไม่ได้ระบุสถานที่'}</span>
                </div>
            </div>
        `;
    }

    // ฟังก์ชันเช็คว่างานกำลังดำเนินอยู่หรือไม่
    function isOngoing(startTime, endTime) {
        const now = new Date();
        if(!startTime || !endTime) return false;
        // ถ้าอยู่ในช่วงเวลาเริ่ม-จบ ถือว่ากำลังดำเนินการ
        return now >= startTime && now <= endTime;
    }

    // โหลดครั้งแรก และตั้งเวลาอัปเดตทุก 5 นาที
    loadSchedule();
    setInterval(loadSchedule, 300000); 
</script>

</body>
</html>
