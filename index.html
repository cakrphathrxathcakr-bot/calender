<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายนามเจ้าภาพ | พระเทพวัชรวิสุทธิ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color-top: #4A148C; /* สีม่วงเข้มด้านบน */
            --bg-color-bottom: #311B92; /* สีม่วงเข้มด้านล่าง */
            --text-color: #ffffff; /* สีข้อความขาว */
            --accent-color: #FFD700; /* สีทอง */
            --card-bg: rgba(255, 255, 255, 0.1); /* สีพื้นหลังการ์ดโปร่งแสง */
            --border-color: rgba(143, 201, 122, 0.3); /* สีขอบเขียวอ่อนจาง */
            --admin-panel-bg: #f9f9f9; /* สีพื้นหลังแผงแอดมิน */
            --admin-text: #333333; /* สีข้อความแผงแอดมิน */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(180deg, var(--bg-color-top) 0%, var(--bg-color-bottom) 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            align-self: center;
        }

        h2 {
            text-align: center;
            font-size: 1.4rem;
            margin: 0;
            line-height: 1.6;
            color: var(--accent-color);
            font-weight: 600;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 150px;
        }

        .loading-text {
            text-align: center;
            color: #8fc97a;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .list-card {
            display: grid;
            grid-template-columns: 30px 1fr 1fr 100px;
            gap: 15px;
            align-items: center;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .list-card .number {
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        .list-card .name {
            font-size: 1rem;
            font-weight: 400;
        }

        .list-card .title {
            font-size: 0.9rem;
            font-weight: 300;
            opacity: 0.8;
        }

        .list-card .amount-section {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .list-card .amount {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        .list-card .currency {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .summary-card {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .summary-card .title {
            font-size: 1.2rem;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .summary-card .total {
            font-size: 2.2rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        .admin-toggle-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #6a1b9a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .admin-toggle-btn:hover {
            background-color: #8e24aa;
        }

        .admin-panel {
            display: none;
            background-color: var(--admin-panel-bg);
            color: var(--admin-text);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .admin-panel h3 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: var(--admin-text);
            font-weight: 600;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: 'Sarabun', sans-serif;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            font-weight: 600;
        }

        .admin-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid #ddd;
            color: var(--admin-text);
        }

        .btn-edit {
            background-color: #ffc107;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Sarabun', sans-serif;
            margin-left: 5px;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Sarabun', sans-serif;
            margin-left: 5px;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 0;
        }

    </style>
</head>
<body>

<div class="container">
    <img src="image_5.png" class="header-image" alt="Poster | พระเทพวัชรวิสุทธิ์">
    
    <h2>รายนามเจ้าภาพไทยธรรมถวายพระสงฆ์ทรงสมณศักดิ์</h2>
    
    <div class="list-container" id="public-list">
        <div class="loading-text">กำลังโหลดรายนามเจ้าภาพ...</div>
    </div>

    <div class="summary-card" id="summary-section">
        <div class="title">ยอดรวมเงินบริจาคทั้งหมด</div>
        <div class="total" id="total-amount">๐ บาท</div>
    </div>

    <button class="admin-toggle-btn" onclick="toggleAdmin()">เข้าสู่โหมดจัดการแอดมิน</button>

    <div class="admin-panel" id="admin-panel">
        <h3>เพิ่มรายชื่อใหม่</h3>
        <div class="input-group">
            <input type="text" id="input-name" placeholder="ชื่อ / สมณศักดิ์">
            <input type="text" id="input-title" placeholder="ตำแหน่ง / วัด (ถ้ามี)">
            <input type="number" id="input-amount" placeholder="จำนวนเงิน (บาท)">
            <button class="btn-add" onclick="addEntry()">บันทึกรายชื่อ</button>
        </div>
        <hr>
        <h3>จัดการรายชื่อ</h3>
        <div id="admin-list"></div>
    </div>

    <div class="footer">
        ครีเอท โดย พระมหาจักรภัทร คมฺภีรญาณเมธี
    </div>
</div>

<script>
    // 🔑 ลูกกุญแจตู้เซฟ Firebase ของคุณ
    const firebaseConfig = {
      apiKey: "AIzaSyDmWsfBchXydatQuIqK8esih4nn3T-i4l8",
      authDomain: "potae-38bc6.firebaseapp.com",
      databaseURL: "https://potae-38bc6-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "potae-38bc6",
      storageBucket: "potae-38bc6.firebasestorage.app",
      messagingSenderId: "935738834503",
      appId: "1:935738834503:web:887b8728eb81551acffb62"
    };

    // เปิดใช้งานระบบ Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const donorsRef = db.ref('donors'); // ชื่อแฟ้ม donors ใน Firebase

    let donorsData = [];

    // ฟังก์ชันแปลงเลขให้เป็นเลขไทย
    function toThaiNum(num) {
        const thaiNumbers = ['๐', '๑', '๒', '๓', '๔', '๕', '๖', '๗', '๘', '๙'];
        return num.toString().replace(/\d/g, (d) => thaiNumbers[d]);
    }

    // 📡 ระบบเรียลไทม์: ฟังชั่นนี้จะทำงานอัตโนมัติทันทีที่มีคนเพิ่ม/ลบ/แก้ข้อมูล
    donorsRef.on('value', (snapshot) => {
        donorsData = [];
        let totalAmount = 0;

        snapshot.forEach((childSnapshot) => {
            donorsData.push({
                key: childSnapshot.key, // เก็บรหัสอ้างอิงของ Firebase
                ...childSnapshot.val()
            });
            totalAmount += Number(childSnapshot.val().amount);
        });

        // 🌟 จัดเรียงข้อมูลตามจำนวนเงิน (มากไปน้อย)
        donorsData.sort((a, b) => b.amount - a.amount);

        // อัปเดตยอดรวม
        document.getElementById('total-amount').innerText = `${toThaiNum(totalAmount.toLocaleString())} บาท`;

        renderList(); // เรียกคำสั่งแสดงผลขึ้นหน้าจอ
    });

    // แสดงผลข้อมูลลงในหน้าเว็บ
    function renderList() {
        const publicList = document.getElementById('public-list');
        const adminList = document.getElementById('admin-list');
        
        publicList.innerHTML = ''; 
        adminList.innerHTML = '';

        if(donorsData.length === 0) {
            publicList.innerHTML = '<div class="loading-text">ยังไม่มีรายนามเจ้าภาพ</div>';
            adminList.innerHTML = '<div style="text-align:center;">ยังไม่มีข้อมูล</div>';
            return;
        }

        donorsData.forEach((donor, index) => {
            const numThai = toThaiNum(index + 1);
            const amountStrThai = toThaiNum(Number(donor.amount).toLocaleString()); // ใส่ลูกน้ำหลักพันแบบเลขไทย
            
            // หน้าสำหรับคนทั่วไป (List Card)
            publicList.innerHTML += `
                <div class="list-card">
                    <div class="number">${numThai}</div>
                    <div>
                        <div class="name">${donor.name}</div>
                        <div class="title">${donor.title || ''}</div>
                    </div>
                    <div class="title"></div>
                    <div class="amount-section">
                        <div class="amount">${amountStrThai}</div>
                        <div class="currency">บาท</div>
                    </div>
                </div>`;

            // หน้าสำหรับแอดมินจัดการ
            adminList.innerHTML += `
                <div class="admin-list-item">
                    <div>
                        <strong>${donor.name}</strong><br>
                        <small>${donor.title || '-'} | ${toThaiNum(Number(donor.amount).toLocaleString())} บาท</small>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="editEntry('${donor.key}', '${donor.name}', '${donor.title || ''}', ${donor.amount})">แก้ไข</button>
                        <button class="btn-delete" onclick="deleteEntry('${donor.key}')">ลบ</button>
                    </div>
                </div>`;
        });
    }

    // ระบบตรวจสอบรหัสผ่านแอดมิน
    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        if (panel.style.display === 'none' || panel.style.display === '') {
            let password = prompt("กรุณาใส่รหัสผ่านเพื่อเข้าสู่โหมดแอดมิน:");
            if (password === "25982599") { // รหัสผ่านของคุณ
                panel.style.display = 'block';
                // เลื่อนหน้าจอลงไปที่แผงแอดมินอย่างนุ่มนวล
                panel.scrollIntoView({ behavior: 'smooth' });
            } else if (password !== null) { 
                alert("รหัสผ่านไม่ถูกต้องครับ"); 
            }
        } else { 
            panel.style.display = 'none'; 
        }
    }

    // [แอดมิน] เพิ่มข้อมูลส่งเข้าตู้เซฟ
    function addEntry() {
        const name = document.getElementById('input-name').value;
        const title = document.getElementById('input-title').value;
        const amount = document.getElementById('input-amount').value;
        
        if (!name || !amount) { 
            alert('กรุณากรอกชื่อและจำนวนเงินให้ครบถ้วนครับ'); 
            return; 
        }
        
        // ส่งข้อมูลเข้า Firebase ทันที
        donorsRef.push({
            name: name,
            title: title,
            amount: parseInt(amount)
        });
        
        // ล้างช่องกรอกข้อมูล
        document.getElementById('input-name').value = '';
        document.getElementById('input-title').value = '';
        document.getElementById('input-amount').value = '';
    }

    // [แอดมิน] ลบข้อมูลออกจากตู้เซฟ
    function deleteEntry(key) {
        if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายชื่อนี้?')) {
            db.ref('donors/' + key).remove();
        }
    }

    // [แอดมิน] แก้ไขข้อมูลในตู้เซฟ
    function editEntry(key, oldName, oldTitle, oldAmount) {
        const newName = prompt('แก้ไขชื่อ:', oldName); 
        if (newName === null) return; 
        
        const newTitle = prompt('แก้ไขตำแหน่ง/วัด:', oldTitle); 
        if (newTitle === null) return;
        
        const newAmount = prompt('แก้ไขจำนวนเงิน:', oldAmount); 
        if (newAmount === null) return;
        
        db.ref('donors/' + key).update({
            name: newName.trim() !== '' ? newName : oldName,
            title: newTitle,
            amount: newAmount !== '' && !isNaN(newAmount) ? parseInt(newAmount) : oldAmount
        });
    }
</script>

</body>
</html>
